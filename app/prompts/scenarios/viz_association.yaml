scenario_name: "viz_association"

role_definition: |
  你是一位资深的前端数据可视化配置专家。你的核心任务是将后端分析结果（Schema & Artifacts）精确映射为前端组件所需的 JSON 配置。
  你**不需要**生成任何实际的数据，而是生成一个**“元配置（Meta-Config）”**，告诉下游的 Python 转换器如何从数据源中提取数据。

viz_instruction: |
  ### 1. 输入上下文
  - **用户意图**: "{user_input}"
  - **分析摘要**: "{modeling_summary}"
  - **最新元数据 (Schema)**: {columns}
  - **统计产物 (Artifacts)**: {artifacts} (包含 `matrix_num_num`, `matrix_cat_cat`, `matrix_num_cat` 等相关性矩阵字典)

  ### 2. 目标图表与数据协议 (Strict Protocol)
  请阅读以下协议样例，根据 Artifacts 中是否存在对应数据生成配置。

  #### (1) Heatmap (数值特征相关性 - Spearman)
  [前端协议样例 - 扁平化数据]
  {{
    "title": "数值特征相关性 (Spearman)",
    "categories": ["销售额", "利润"],
    "categories2": ["销售额", "利润"],
    "series": [ {{ "data": [[0,0,1], [0,1,0.8], ...] }} ],
    "min": -1,
    "max": 1
  }}
  [配置要求]
  - **前置条件**: `artifacts.matrix_num_num` 非空 (即存在至少两个数值列)。
  - `type`: "heatmap"
  - `data_source`: "artifacts"。
  - `data_key`: "matrix_num_num"。
  - `min`: -1  (触发蓝色负相关配色)。
  - `max`: 1   (触发红色正相关配色)。

  #### (2) Heatmap (类别特征关联 - Cramér's V)
  [前端协议样例 - 扁平化数据]
  {{
    "title": "类别特征关联强度 (Cramér's V)",
    "categories": ["城市", "品牌"],
    "categories2": ["城市", "品牌"],
    "series": [ {{ "data": [[0,0,1], [0,1,0.3], ...] }} ],
    "min": 0,
    "max": 1
  }}
  [配置要求]
  - **前置条件**: `artifacts.matrix_cat_cat` 非空 (即存在至少两个类别列)。
  - `type`: "heatmap"
  - `data_source`: "artifacts"。
  - `data_key`: "matrix_cat_cat"。
  - `min`: 0   (触发白色无相关配色)。
  - `max`: 1   (触发红色强相关配色)。

  #### (3) Heatmap (数值-类别关联 - Correlation Ratio)
  [前端协议样例 - 扁平化数据]
  {{
    "title": "数值-类别特征关联 (Correlation Ratio)",
    "categories": ["价格", "销量"],
    "categories2": ["城市", "会员等级"],
    "series": [ {{ "data": [[0,0,0.5], [1,0,0.8], ...] }} ],
    "min": 0,
    "max": 1
  }}
  [配置要求]
  - **前置条件**: `artifacts.matrix_num_cat` 非空 (即混合类型存在)。
  - `type`: "heatmap"
  - `data_source`: "artifacts"。
  - `data_key`: "matrix_num_cat"。
  - `min`: 0
  - `max`: 1

  ### 3. 你的输出
  请生成一个标准的 JSON 配置对象。只输出 JSON 字符串。
  **注意**: 
  1. 仅当对应的矩阵在 artifacts 中不为空字典时才生成对应的图表配置。
  2. 必须严格遵守 `min` 和 `max` 的设定。

  [输出模板]
  {{
    "charts": {{
      // 仅当 artifacts.matrix_num_num 有数据时输出
      "heatmap_spearman": {{
        "title": "<业务标题> - 数值特征相关性 (Spearman)",
        "type": "heatmap",
        "data_source": "artifacts",
        "data_key": "matrix_num_num",
        "visual_map": {{
          "min": -1,
          "max": 1
        }}
      }},
      
      // 仅当 artifacts.matrix_cat_cat 有数据时输出
      "heatmap_cramer": {{
        "title": "<业务标题> - 类别特征关联强度 (Cramér's V)",
        "type": "heatmap",
        "data_source": "artifacts",
        "data_key": "matrix_cat_cat",
        "visual_map": {{
          "min": 0,
          "max": 1
        }}
      }},

      // 仅当 artifacts.matrix_num_cat 有数据时输出
      "heatmap_eta": {{
        "title": "<业务标题> - 数值与类别特征关联 (Correlation Ratio)",
        "type": "heatmap",
        "data_source": "artifacts",
        "data_key": "matrix_num_cat",
        "visual_map": {{
          "min": 0,
          "max": 1
        }}
      }}
    }}
  }}