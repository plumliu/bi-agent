chart_type: radar
description: 雷达图，用于展示多维特征对比（多系列多维度画像）

data_protocol: |
  前端 Vue 组件需要的数据格式：
  {
    "type": "radar",
    "data": {
      "title": "图表标题",
      "indicator": [                    // 雷达图的维度定义（轴）
        {"name": "维度1", "max": 最大值1},
        {"name": "维度2", "max": 最大值2}
      ],
      "series": [                       // 多个系列（多个对象）
        {
          "name": "系列名称",           // 系列名称（用于图例）
          "data": [                     // 对象数组（每个对象包含 name 和 value）
            {"name": "维度1", "value": 数值1},
            {"name": "维度2", "value": 数值2}
          ]
        }
      ]
    }
  }

  【字段说明】
  - indicator: 数组，定义雷达图的所有维度（轴）
    - name: 字符串，维度名称（显示在雷达图轴上）
    - max: 数值，该维度的最大值（用于归一化）

  - series: 数组，每个元素代表一个对比对象（如不同群组、不同产品）
    - name: 字符串，系列名称（用于图例）
    - data: **对象数组**，每个对象包含：
      - name: 字符串，维度名称（必须与 indicator 中的 name 一致）
      - value: 数值，该维度的实际值

  【关键约束】
  1. series[i].data 的长度必须等于 indicator 的长度
  2. series[i].data 中的 name 顺序必须与 indicator 中的 name 顺序一致
  3. 组件内部会提取 data.map(d => d.value) 作为纯数值数组传给 ECharts

example: |
  {
    "type": "radar",
    "data": {
      "title": "各用户群组画像对比",
      "indicator": [
        {"name": "recency", "max": 403},
        {"name": "freq", "max": 27},
        {"name": "money", "max": 13080}
      ],
      "series": [
        {
          "name": "分组 1",
          "data": [
            {"name": "recency", "value": 24.25},
            {"name": "freq", "value": 6.25},
            {"name": "money", "value": 1475.0}
          ]
        },
        {
          "name": "分组 2",
          "data": [
            {"name": "recency", "value": 150.5},
            {"name": "freq", "value": 15.0},
            {"name": "money", "value": 5000.0}
          ]
        }
      ]
    }
  }

common_errors: |
  【常见错误及解决方案】

  1. 数据结构错误
     - 错误：series[].data 是纯数值数组 [24.25, 6.25, 1475.0]
     - 解决：必须是对象数组 [{"name": "recency", "value": 24.25}, ...]

  2. 长度不匹配
     - 错误：series[i].data 长度与 indicator 长度不一致
     - 解决：确保每个系列的 data 包含所有维度

  3. 维度名称不一致
     - 错误：indicator 中是 "recency"，data 中是 "Recency"（大小写不同）
     - 解决：严格保持一致（建议使用原始列名）

  4. 维度顺序错误
     - 错误：data 中的维度顺序与 indicator 不一致
     - 解决：按 indicator 的顺序构建 data 数组

  5. max 值设置不当
     - 错误：max 值小于实际数据，导致超出雷达图范围
     - 解决：max 应为所有系列中该维度的最大值 * 1.2（留余量）

  6. 负数值
     - 错误：数据中包含负数
     - 解决：雷达图不支持负值，需要归一化或使用其他图表类型

  【最佳实践】
  - max 值计算：df.groupby('cluster')['feature'].max().max() * 1.2
  - 维度顺序：使用 indicator 的 name 列表作为基准
  - 数值精度：round(value, 2) 保留两位小数
  - 系列数量：建议不超过 5 个系列，过多会导致图表混乱


