chart_type: scatter
description: 散点图，用于展示二维数据分布，支持按类别着色和扩展字段 tooltip

data_protocol: |
  前端 Vue 组件需要的数据格式：
  {
    "type": "scatter",
    "data": {
      "title": "图表标题",
      "series": [
        {
          "name": "系列名称（如分类标签）",
          "data": [
            {
              "value": [x值, y值],           // 必填：二维坐标数组
              "任意字段名": "任意值"          // 可选：任意扩展字段
            }
          ]
        }
      ]
    }
  }

  【字段说明】
  - series: 数组，每个元素代表一个分类/系列
    - name: 字符串，系列名称（显示在图例中）
    - data: 数组，每个元素是一个数据点对象
      - value: **必填**，[x, y] 二维数组（坐标）
      - 其他字段: **可选**，任意字段都会在 tooltip 中显示

  【扩展字段机制（重要）】
  组件会自动遍历 data 对象中除 value 外的所有字段，并在 tooltip 中显示：
  - 字段名会自动格式化（首字母大写，驼峰转空格）
  - 例如：uid → Uid, extraInfo → Extra Info
  - 所有字段值都会显示在 tooltip 的悬浮框中

  【颜色规则】
  - 前 3 个系列使用固定颜色：
    - 系列 0: #5470c6（蓝色）
    - 系列 1: #91cc75（绿色）
    - 系列 2: #fac858（黄色）
  - 第 4 个及以后的系列会重复使用黄色

example: |
  【示例1：基础散点图（仅坐标）】
  {
    "type": "scatter",
    "data": {
      "title": "用户分群分布图",
      "series": [
        {
          "name": "群组1",
          "data": [
            {"value": [-0.117, -0.970]},
            {"value": [0.523, -1.205]}
          ]
        },
        {
          "name": "群组2",
          "data": [
            {"value": [2.408, 0.470]},
            {"value": [1.892, 0.315]}
          ]
        }
      ]
    }
  }

  【示例2：带扩展字段（推荐）】
  {
    "type": "scatter",
    "data": {
      "title": "用户分群分布图（含详细信息）",
      "series": [
        {
          "name": "高价值用户",
          "data": [
            {
              "value": [-0.117, -0.970],
              "uid": "user_05",
              "recency": 24,
              "frequency": 6,
              "monetary": 1475.0,
              "status": "活跃"
            }
          ]
        },
        {
          "name": "潜力用户",
          "data": [
            {
              "value": [2.408, 0.470],
              "uid": "user_01",
              "recency": 150,
              "frequency": 3,
              "monetary": 800.0,
              "status": "沉睡"
            }
          ]
        }
      ]
    }
  }

common_errors: |
  【常见错误及解决方案】

  1. value 格式错误
     - 错误：value 是单个数值 123 或字符串 "[1, 2]"
     - 解决：必须是数组 [x, y]，使用 [float(x), float(y)]

  2. value 包含 NaN/Inf
     - 错误：数据中有 NaN 或 Inf 导致图表无法渲染
     - 解决：df.replace([np.inf, -np.inf], np.nan).dropna()

  3. 未按分类分组
     - 错误：所有数据放在一个 series 中，无法按类别着色
     - 解决：使用 df.groupby('category') 生成多个 series

  4. 系列名称不是字符串
     - 错误：name 是数值 1 而非字符串 "1"
     - 解决：使用 str(category) 转换，确保是字符串 "1"

  5. 扩展字段包含复杂对象
     - 错误：扩展字段是列表或字典，tooltip 显示 [object Object]
     - 解决：转换为字符串或提取关键信息

  6. 数据点过多
     - 错误：超过 1000 个点，渲染卡顿
     - 解决：采样

  【最佳实践】
  - 坐标归一化：使用 PCA 或 StandardScaler 将数据映射到 [-3, 3] 范围
  - 扩展字段选择：只包含用户关心的字段（3-5 个）
  - 数值精度：坐标保留 3 位小数，业务字段保留 2 位
  - 系列数量：建议不超过 5 个，过多会导致图例混乱
  - 字段命名：优先使用中文，不得已使用英文时，应使用驼峰命名（如 userId）或下划线（如 user_id）

