chart_type: lineWithConfidence
description: 置信区间折线图，用于展示预测趋势及其不确定性（支持多系列和垂直缩放）

data_protocol: |
  前端 Vue 组件需要的数据格式：
  {
    "type": "lineWithConfidence",
    "data": {
      "title": "图表标题",
      "categories": [...],           // X 轴数据（通常是时间）
      "series": [                    // 多条折线（每条可有置信区间）
        {
          "name": "系列名称",
          "data": [...],             // 主数据（必填）
          "lowers": [...],           // 置信区间下界（可选）
          "uppers": [...]            // 置信区间上界（可选）
        }
      ]
    }
  }

  【字段说明】
  - categories: 数组，X 轴标签（如日期、时间点）
  - series: 数组，每个元素代表一条折线
    - name: 字符串，系列名称（用于图例）
    - data: **必填**，数组，主数据（Y 轴数值）
    - lowers: **可选**，数组，置信区间下界（与 data 长度一致）
    - uppers: **可选**，数组，置信区间上界（与 data 长度一致）

  【置信区间规则】
  - 如果 lowers 和 uppers 都存在且有宽度（lowers[i] ≠ uppers[i]），则绘制阴影带
  - 如果 lowers[i] == uppers[i]（无宽度），则不绘制该点的阴影
  - 如果不提供 lowers/uppers，则只绘制主数据线（无阴影），退化成普通折线图

  【关键约束】
  1. categories、data、lowers、uppers 长度必须完全一致
  2. lowers[i] <= data[i] <= uppers[i]（逻辑约束）
  3. 如果仅仅是单系列预测 data 中的值通常不能为 null
  4. 而如果代表历史实测值与预测值，则应满足：
     - 历史区间：预测系列（及其 lowers/uppers）在历史月份一律填 null，不应输出“伪预测值”
     - 未来区间：历史实测系列（及其 lowers/uppers）在未来月份一律填 null
     - 拼接点（最后一个历史月份）：允许在“预测系列”的该月份填入与“历史实测值”完全相同的 data/lowers/uppers，用于视觉连续；该点不代表真实预测区间
     - 除拼接点外：预测系列的未来月份必须给出有效的 data/lowers/uppers（且满足第2条约束），历史系列在对应月份保持 null

example: |
  【示例1：单系列预测（含置信区间）】
  {
    "type": "lineWithConfidence",
    "data": {
      "title": "未来4个月销售额预测",
      "categories": ["2024-01", "2024-02", "2024-03", "2024-04"],
      "series": [
        {
          "name": "预测值",
          "data": [100, 110, 105, 115],
          "lowers": [90, 100, 95, 105],
          "uppers": [110, 120, 115, 125]
        }
      ]
    }
  }

  【示例2：多系列对比（预测 + 历史）】
  {
    "type": "lineWithConfidence",
    "data": {
      "title": "9月、10月的销售额与历史对比",
      "categories": ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月"],
      "series": [
        {
          "name": "模型预测 (含95%置信区间)",
          "data": [null, null, null, null, null, null, null, 128, 130, 127],      // 预测值仅有未来的两个月（"9月", "10月"）的数值是有意义的，"8月"的数值与历史值完全相同，用于视觉上的拼接
          "lowers": [null, null, null, null, null, null, null, 128, 110, 120],    // 对于前面的历史值，"data"、"lowers"、"uppers"均应该填 null
          "uppers": [null, null, null, null, null, null, null, 128, 133, 130]     // 可以看到"8月"的"data"、"lowers"、"uppers" 均为和“历史实测值”相同的 128
        },
        {
          "name": "历史实测值",
          "data": [105, 108, 102, 118, 122, 128, 130, 133, 128, null, null],      // 在实测值系列中，未来的两个月（"9月", "10月"）均应该填 null
          "lowers": [105, 108, 102, 118, 122, 128, 130, 133, 128, null, null],    // 而历史销售记录的最后一个月（"8月"），它的"data"、"lowers"、"uppers" 会赋值到“模型预测 (含95%置信区间)”的对应位置，仅仅为了视觉拼接
          "uppers": [105, 108, 102, 118, 122, 128, 130, 133, 128, null, null]
        }
      ]
    }
  }

common_errors: |
  【常见错误及解决方案】

  1. 长度不匹配
     - 错误：lowers/uppers 长度与 data 不一致
     - 解决：确保所有数组长度与 categories 相同

  2. 置信区间包含 null
     - 错误：lowers 或 uppers 中有 null 值，导致阴影断裂
     - 解决：使用插值填充 null，或接受断裂效果

  3. 上下界相等
     - 错误：所有点的 lowers[i] == uppers[i]，阴影不显示
     - 解决：确保置信区间有宽度，或不提供 lowers/uppers

  4. 上下界倒置
     - 错误：lowers[i] > uppers[i]
     - 解决：交换上下界，或检查数据生成逻辑

  5. Y 轴范围截断
     - 错误：置信区间超出 Y 
     - 解决：组件会自动基于 data 计算 Y 轴范围（不包含置信区间）

  【最佳实践】
  - 数据点数量：建议不超过 100 个点
  - 置信区间宽度：建议使用 95% 或 90% 置信区间
  - 历史数据处理：lowers 和 uppers 都设为 data 的值（无阴影）
  - 数值精度：保留 2 位小数
  - 系列数量：建议不超过 3 个（过多会导致阴影重叠）

  【组件特性】
  - 阴影带实现：使用堆叠面积图（stack）
    - 基座线：透明线条，数据为 lowers
    - 填充层：半透明面积，数据为 uppers - lowers
    - 主数据线：实线，数据为 data

  - 平滑曲线：smooth: 0.35（贝塞尔曲线）
    - 阴影带和主线都使用相同的平滑度
    - 确保视觉一致性

  - 颜色循环：6 色调色板
    - #5470c6（蓝）, #91cc75（绿）, #fac858（黄）, #ee6666（红）, #73c0de（青）, #3ba272（深绿）
    - 阴影带透明度：0.25

  - Y 轴范围计算：
    - **仅基于 series[].data 计算**（不包含置信区间）
    - min = Math.min(...data) - padding
    - max = Math.max(...data) + padding
    - padding = range * 0.2（上下各留 20% 空间）

  - 垂直缩放（dataZoom）：
    - type: 'inside'（鼠标滚轮缩放）
    - type: 'slider'（左侧滑块）
    - orient: 'vertical'（垂直方向）
    - filterMode: 'none'（不过滤数据，只调整视图）

  - tooltip:
    - trigger: 'axis'（悬浮在 X 轴位置显示所有系列）
    - 自动显示主值和上下界
    - 格式："{系列名}: {主值}<br/>{系列名}_下界: {下界}<br/>{系列名}_上界: {上界}"
    - 如果上下界相等，不显示区间信息

  - 样式细节：
    - symbolSize: 8（数据点大小）
    - lineStyle.width: 3（主线粗细）
    - 阴影带 z-index: 1-2（在主线下方）
    - 主线 z-index: 10（在阴影带上方）

  - 图表高度: 400px

  【置信区间判断逻辑】
  组件会自动判断是否绘制阴影带：
  - 条件1：lowers 和 uppers 都存在
  - 条件2：至少有一个点满足 lowers[i] ≠ uppers[i] 且都不为 null
  - 如果不满足，只绘制主线（无阴影）

  【历史数据的特殊处理】
  对于历史实测值（无不确定性）：
  - 设置 lowers = data
  - 设置 uppers = data
  - 组件会检测到无宽度，不绘制阴影带
