chart_type: line
description: 折线图，用于展示数据随时间或连续变量的趋势变化（支持多系列12色循环）

data_protocol: |
  前端 Vue 组件需要的数据格式：
  {
    "type": "line",
    "data": {
      "title": "图表标题",
      "categories": [...],           // X 轴数据（通常是时间或连续变量）
      "series": [                    // 多条折线
        {
          "name": "系列名称",
          "data": [...]              // Y 轴数据（数值型）
        }
      ]
    }
  }

  【字段说明】
  - categories: 数组，X 轴标签（如日期、月份、连续数值等）
  - series: 数组，每个元素代表一条折线
    - name: 字符串，折线名称（用于图例）
    - data: 数组，Y 轴数值（与 categories 长度一致）

  【关键约束】
  1. categories 与 series[i].data 长度必须完全一致
  2. 所有 series 的 data 长度必须相同
  3. data 中的值必须是数值类型（不能是字符串）

example: |
  {
    "type": "line",
    "data": {
      "title": "月度销售额趋势",
      "categories": ["1月", "2月", "3月", "4月", "5月", "6月"],
      "series": [
        {
          "name": "产品A",
          "data": [120, 132, 101, 134, 90, 230]
        },
        {
          "name": "产品B",
          "data": [220, 182, 191, 234, 290, 330]
        }
      ]
    }
  }

common_errors: |
  【常见错误及解决方案】

  1. 数据类型错误
     - 错误：categories 包含数值型而非字符串
     - 解决：使用 df['date'].astype(str).tolist() 转换

  2. 长度不匹配
     - 错误：series[i].data 长度与 categories 不一致
     - 解决：确保所有 series 的 data 长度与 categories 相同

  3. NaN/Inf 值
     - 错误：数据中包含 NaN 或 Inf
     - 解决：使用 df.replace([np.inf, -np.inf], np.nan).dropna()

  4. 时间序列排序
     - 错误：时间轴未排序，导致折线混乱
     - 解决：在处理前先按时间列排序：df.sort_values('date')

  5. 多系列数据透视
     - 错误：数据格式不适合多系列展示
     - 解决：使用 pivot_table 或 groupby 重组数据

  6. 数据点过多
     - 错误：超过 200 个点，图表拥挤
     - 解决：采样或聚合（如按周/月汇总）

  【最佳实践】
  - 时间数据格式化：pd.to_datetime(df['date']).dt.strftime('%Y-%m-%d')
  - 数值精度控制：round(value, 2) 保留两位小数
  - 缺失值处理：可以用 fillna(0) 或 interpolate() 填充
  - 数据点数量：建议不超过 100 个点，过多会影响性能
  - 系列数量：建议不超过 10 个，过多会导致图例混乱

  【组件特性】
  - 颜色循环：支持 12 色调色板，自动循环
    - 颜色顺序：#5470c6（蓝）, #91cc75（绿）, #fac858（黄）, #ee6666（红）,
                #73c0de（青）, #3ba272（深绿）, #fc8452（橙）, #9a60b4（紫）,
                #ea7ccc（粉）, #67c2a5（青绿）, #8da0cb（灰蓝）, #e78ac3（粉紫）
    - 第 13 个系列会重复使用第 1 个颜色

