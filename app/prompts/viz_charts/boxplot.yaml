chart_type: boxplot
description: 箱线图，用于异常检测可视化（箱线图 + 异常散点双层渲染）

data_protocol: |
  前端 Vue 组件需要的数据格式：
  {
    "type": "boxplot",
    "data": {
      "title": "图表标题",
      "categories": [...],           // X 轴标签（特征名）
      "series": [
        {
          "data": [                  // 箱线图统计数据（五数概括）
            [min, Q1, median, Q3, max],
            [min, Q1, median, Q3, max]
          ],
          "outliers": [              // 异常点数据（扁平化对象数组）
            {
              "value": [x索引, y值],
              "任意字段": "任意值"    // 扩展字段（显示在 tooltip）
            }
          ]
        }
      ]
    }
  }

  【字段说明】
  - categories: 数组，X 轴标签（**未标准化的**特征名，如 ["销售额", "利润", "成本"]）

  - series[0].data: 数组，每个元素是一个五元组 [min, Q1, median, Q3, max]
    - **关键要求**：五元组的所有值**必须使用标准化后的值**（如 Z-Score）
    - min: 标准化后的最小值（下边缘）
    - Q1: 标准化后的第一四分位数（25%）
    - median: 标准化后的中位数（50%）
    - Q3: 标准化后的第三四分位数（75%）
    - max: 标准化后的最大值（上边缘）

  - series[0].outliers: 数组，每个元素是一个异常点对象
    - value: **必填**，[x, y] 二维数组
      - x: 整数，特征索引（0 到 len(categories)-1）
      - y: **标准化后的数值**（如 Z-Score），用于渲染散点位置
    - 其他字段: **可选但强烈推荐**，任意扩展字段
      - **关键要求**：扩展字段必须使用**未标准化的原始值**
      - 用途：在 tooltip 中显示给业务人员阅读
      - 示例：实体ID、原始销售额、原始利润、日期、异常类型等

  【扩展字段机制（重要）】
  组件会自动遍历 outliers 对象中除 value 外的所有字段，并在 tooltip 中显示：
  - 当前检测维度会高亮显示（背景色 + 加粗）
  - 其他字段正常显示
  - 支持任意数量的扩展字段

  【关键约束】
  1. series[0].data 的长度必须等于 categories 的长度
  2. 每个五元组必须满足：min <= Q1 <= median <= Q3 <= max
  3. outliers[i].value[0] 必须在 [0, len(categories)-1] 范围内

example: |
  【示例：多特征异常检测】
  {
    "type": "boxplot",
    "data": {
      "title": "销售数据异常检测",
      "categories": ["销售额", "利润", "成本"],
      "series": [
        {
          "data": [
            [-1.5, -0.8, 0.0, 0.8, 1.5],    // 销售额统计（标准化后的 Z-Score）
            [-2.0, -1.0, 0.0, 1.0, 2.0],    // 利润统计（标准化后的 Z-Score）
            [-1.2, -0.5, 0.0, 0.5, 1.2]     // 成本统计（标准化后的 Z-Score）
          ],
          "outliers": [
            {
              "value": [0, 3.5],        // [特征索引, 标准化后的 Z-Score]
              "实体ID": "order_12345",
              "销售额": 250,             // 未标准化的原始值（tooltip 显示）
              "利润": 35,                // 未标准化的原始值（tooltip 显示）
              "成本": 65,                // 未标准化的原始值（tooltip 显示）
              "日期": "2024-01-15",
              "异常类型": "超高值"
            },
            {
              "value": [1, -2.8],       // [特征索引, 标准化后的 Z-Score]
              "实体ID": "order_67890",
              "销售额": 120,             // 未标准化的原始值（tooltip 显示）
              "利润": -10,               // 未标准化的原始值（tooltip 显示）
              "成本": 80,                // 未标准化的原始值（tooltip 显示）
              "日期": "2024-02-20",
              "异常类型": "负利润"
            },
            {
              "value": [2, 4.2],        // [特征索引, 标准化后的 Z-Score]
              "实体ID": "order_11111",
              "销售额": 100,             // 未标准化的原始值（tooltip 显示）
              "利润": 15,                // 未标准化的原始值（tooltip 显示）
              "成本": 180,               // 未标准化的原始值（tooltip 显示）
              "日期": "2024-03-10",
              "异常类型": "成本过高"
            }
          ]
        }
      ]
    }
  }

common_errors: |
  【常见错误及解决方案】

  1. **混用标准化和未标准化的值（严重错误）**
     - 错误：series[].data 使用原始值，outliers[].value[1] 使用 Z-Score
     - 错误：outliers 扩展字段使用标准化后的值
     - 解决：
       - series[].data 的五元组：**必须全部使用标准化后的值**
       - outliers[].value[1]：**必须使用标准化后的值**（用于渲染位置）
       - outliers 的其他字段：**必须使用未标准化的原始值**（用于 tooltip）

  2. 五元组格式错误
     - 错误：data 不是 [min, Q1, median, Q3, max] 五元组
     - 解决：严格按照五元组格式，使用 numpy.percentile 计算

  3. 五元组顺序错误
     - 错误：min > Q1 或 Q3 > max
     - 解决：确保 min <= Q1 <= median <= Q3 <= max

  4. outliers.value 格式错误
     - 错误：value 不是 [x, y] 二维数组
     - 解决：使用 [int(feature_index), float(anomaly_score)]

  5. 特征索引越界
     - 错误：outliers[i].value[0] 超出 categories 范围
     - 解决：确保 x < len(categories)

  6. 扩展字段缺失
     - 错误：outliers 只有 value，没有其他字段
     - 解决：添加实体ID、原始值等关键信息

  7. Y 轴单位不统一
     - 错误：不同特征的异常程度单位不同
     - 解决：统一使用标准差倍数（Z-score）

  【最佳实践】
  - 特征数量：建议 3-10 个，不超过 15 个
  - 异常点数量：建议不超过 50 个（过多会导致重叠）
  - Y 轴单位：统一使用标准差倍数（如 ±3σ）
  - 扩展字段选择：
    - 必填：实体ID（用于追溯）
    - 推荐：原始值、日期、异常类型
    - 可选：其他业务字段
  - 五元组计算：
    - min/max: 使用 1.5*IQR 规则或 ±3σ
    - Q1/Q3: numpy.percentile(data, [25, 75])
    - median: numpy.median(data)

  【组件特性】
  - 双层渲染：箱线图（背景）+ 散点图（前景）

  【tooltip 高亮逻辑】
  组件会自动判断哪个字段与当前检测维度相关：
  - 如果字段名 == 当前特征名（如 "销售额"）
  - 或字段名包含当前特征名（如 "销售额_原始值"）
  - 则该字段会高亮显示

  【数据处理建议】

  **数据使用优先级（极其重要）**
  1. **优先使用上游提供的现成数据**
     - 仔细阅读所有列名和列描述（file_metadata）
     - 查找是否已有标准化后的列（如 "销售额_标准化"、"z_score"、"standardized_*"）
     - 查找是否已有五元组数据（如 "Q1"、"Q3"、"median"、"min"、"max" 列）
     - 查找是否已有异常标记列（如 "is_outlier"、"anomaly_score"）
     - **如果上游已提供，直接使用，不要重新计算**

  2. **仅在数据缺失时才自行计算**
     - 如果没有标准化列，才使用下方的 Z-Score 计算代码
     - 如果没有五元组，才使用下方的 quantile 计算代码
     - 如果没有异常标记，才使用 3σ 规则识别异常点

  **关键流程：标准化处理（仅在上游未提供时使用）**
  ```python
  # 1. 对每个特征进行标准化（Z-Score）
  features = ['销售额', '利润', '成本']
  df_standardized = df.copy()

  for col in features:
      mean = df[col].mean()
      std = df[col].std()
      df_standardized[f'{col}_标准化'] = (df[col] - mean) / std

  # 2. 计算标准化后的五元组（用于 series[].data）
  boxplot_data = []
  for col in features:
      standardized_col = f'{col}_标准化'
      Q1 = df_standardized[standardized_col].quantile(0.25)
      Q3 = df_standardized[standardized_col].quantile(0.75)
      median = df_standardized[standardized_col].median()
      min_val = df_standardized[standardized_col].min()
      max_val = df_standardized[standardized_col].max()
      boxplot_data.append([min_val, Q1, median, Q3, max_val])

  # 3. 识别异常点并构建 outliers 数组
  outliers = []
  for idx, row in df.iterrows():
      for feature_idx, col in enumerate(features):
          z_score = df_standardized.loc[idx, f'{col}_标准化']
          if abs(z_score) > 3:  # 3σ 规则
              outlier_obj = {
                  "value": [feature_idx, float(z_score)],  # 标准化值
                  "实体ID": row['id'],
                  # 以下是未标准化的原始值（用于 tooltip）
                  "销售额": float(row['销售额']),
                  "利润": float(row['利润']),
                  "成本": float(row['成本']),
                  "异常类型": "高异常" if z_score > 0 else "低异常"
              }
              outliers.append(outlier_obj)
  ```

  使用 IQR 方法计算箱线图边界：
  ```python
  Q1 = df[col].quantile(0.25)
  Q3 = df[col].quantile(0.75)
  IQR = Q3 - Q1
  lower_bound = Q1 - 1.5 * IQR
  upper_bound = Q3 + 1.5 * IQR
  outliers = df[(df[col] < lower_bound) | (df[col] > upper_bound)]
  ```

  使用 Z-score 计算异常程度：
  ```python
  mean = df[col].mean()
  std = df[col].std()
  z_score = (value - mean) / std
  ```
