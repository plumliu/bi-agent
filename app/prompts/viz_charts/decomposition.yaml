chart_type: decomposition
description: 时序分解图，用于 STL 分解可视化（瀑布图风格，展示趋势、季节性、残差）

data_protocol: |
  前端 Vue 组件需要的数据格式：
  {
    "type": "decomposition",
    "data": {
      "title": "图表标题",
      "categories": [...],           // X 轴数据（时间序列）
      "series": [                    // 必须包含 4 个分量
        {
          "name": "Trend",           // 趋势分量（必填）
          "data": [...]
        },
        {
          "name": "Seasonal",        // 季节性分量（必填）
          "data": [...]
        },
        {
          "name": "Residual",        // 残差分量（必填）
          "data": [...]
        },
        {
          "name": "Observed",        // 观测值（必填）
          "data": [...]
        }
      ]
    }
  }

  【字段说明】
  - categories: 数组，X 轴时间标签
  - series: 数组，**必须包含且仅包含 4 个分量**（顺序不重要）
    - Trend: 趋势分量（长期变化）
    - Seasonal: 季节性分量（周期性波动）
    - Residual: 残差分量（随机噪声）
    - Observed: 原始观测值（用于对比）

  【分量名称（大小写敏感）】
  组件使用 `series.find(s => s.name === 'Trend')` 查找分量，因此：
  - 名称必须完全匹配：'Trend', 'Seasonal', 'Residual', 'Observed'
  - 大小写敏感：'trend' 或 'TREND' 都不会被识别

  【瀑布图堆叠逻辑】
  组件通过 custom renderItem 绘制堆叠效果：
  - 基座：Trend（虚线框）
  - 第一层：Trend + Seasonal（渐变块）
  - 第二层：Trend + Seasonal + Residual（渐变块）
  - 叠加：Observed 折线（用于对比）

  【关键约束】
  1. series 必须包含 4 个分量，缺一不可
  2. 所有分量的 data 长度必须与 categories 一致
  3. 分量名称大小写必须匹配
  4. 数学关系：Observed ≈ Trend + Seasonal + Residual

example: |
  {
    "type": "decomposition",
    "data": {
      "title": "月度销售额 STL 分解",
      "categories": ["2023-01", "2023-02", "2023-03", "2023-04", "2023-05", "2023-06"],
      "series": [
        {
          "name": "Trend",
          "data": [100, 102, 105, 108, 110, 112]
        },
        {
          "name": "Seasonal",
          "data": [5, -3, 8, -2, 6, -4]
        },
        {
          "name": "Residual",
          "data": [1.2, -0.8, 0.5, 1.5, -1.0, 0.3]
        },
        {
          "name": "Observed",
          "data": [106.2, 98.2, 113.5, 107.5, 115.0, 108.3]
        }
      ]
    }
  }

common_errors: |
  【常见错误及解决方案】

  1. 分量缺失
     - 错误：series 只有 3 个分量（缺少 Observed）
     - 解决：确保包含全部 4 个分量

  2. 分量名称错误
     - 错误：使用 'trend'（小写）或 'Trends'（复数）
     - 解决：严格使用 'Trend', 'Seasonal', 'Residual', 'Observed'

  3. 长度不匹配
     - 错误：Trend 有 10 个点，Seasonal 有 9 个点
     - 解决：确保所有分量长度与 categories 一致

  4. 数学关系不成立
     - 错误：Observed ≠ Trend + Seasonal + Residual
     - 解决：检查 STL 分解算法，确保加法模型成立

  5. 分量顺序混乱
     - 错误：担心 series 顺序影响渲染
     - 解决：组件使用 find() 查找，顺序不重要

  6. 数据类型错误
     - 错误：data 包含字符串 "100" 而非数值 100
     - 解决：使用 df[col].astype(float).tolist()

  【最佳实践】
  - 时间点数量：建议 12-100 个点（至少 2 个周期）
  - 数值精度：保留 2 位小数
  - 分量范围：
    - Trend: 主要数值范围
    - Seasonal: 通常在 ±20% Trend 范围内
    - Residual: 通常在 ±5% Trend 范围内
  - 时间标签：使用 YYYY-MM 或 YYYY-MM-DD 格式

  【组件特性】
  - 瀑布图风格：通过 custom renderItem 实现堆叠效果

  【渲染逻辑详解】
  对于每个时间点 i，组件计算 4 个 Y 坐标：
  1. y0 = 0（基线）
  2. y1 = Trend[i]
  3. y2 = Trend[i] + Seasonal[i]
  4. y3 = Trend[i] + Seasonal[i] + Residual[i]

  然后绘制 3 个矩形：
  - 矩形1（Trend）：从 y0 到 y1，虚线框
  - 矩形2（Seasonal）：从 y1 到 y2，渐变填充
  - 矩形3（Residual）：从 y2 到 y3，渐变填充

  最后叠加 Observed 折线用于对比。

  【STL 分解建议】
  使用 statsmodels 可尝试进行 STL 分解，如果上游已计算好，则**不能**进行 STL 建模：
  ```python
  from statsmodels.tsa.seasonal import STL

  stl = STL(df['value'], seasonal=13)  # seasonal 为周期长度
  result = stl.fit()

  trend = result.trend.tolist()
  seasonal = result.seasonal.tolist()
  residual = result.resid.tolist()
  observed = df['value'].tolist()
  ```

  【验证数学关系】
  ```python
  import numpy as np

  reconstructed = np.array(trend) + np.array(seasonal) + np.array(residual)
  error = np.abs(reconstructed - np.array(observed)).max()

  assert error < 1e-6, "分解不满足加法模型"
  ```
