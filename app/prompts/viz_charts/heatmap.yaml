chart_type: heatmap
description: 热力图，用于展示二维矩阵数据（支持双极发散和单极渐变配色）

data_protocol: |
  前端 Vue 组件需要的数据格式：
  {
    "type": "heatmap",
    "data": {
      "title": "图表标题",
      "xAxis": [...],                // X 轴标签（列名）
      "yAxis": [...],                // Y 轴标签（行名）
      "series": [
        {
          "data": [                  // 热力图数据（三元组数组）
            [x索引, y索引, 数值],
            [x索引, y索引, 数值]
          ]
        }
      ],
      "visualMap": {                 // 颜色映射配置
        "min": 最小值,
        "max": 最大值
      }
    }
  }

  【字段说明】
  - xAxis: 数组，X 轴标签（字符串数组）
  - yAxis: 数组，Y 轴标签（字符串数组）
  - series[0].data: 数组，每个元素是 [x, y, value] 三元组
    - x: 整数，X 轴索引（0 到 len(xAxis)-1）
    - y: 整数，Y 轴索引（0 到 len(yAxis)-1）
    - value: 数值，该位置的热力值
  - visualMap: 对象，颜色映射范围
    - min: 数值，最小值（决定配色策略）
    - max: 数值，最大值

  【兼容格式】
  组件还支持以下字段别名：
  - categories2 → xAxis
  - categories → yAxis
  - data → series[0].data

  【配色策略（自动判断）】
  组件根据 visualMap.min 自动选择配色：
  - **双极发散**（min < 0）：蓝-白-红
    - 适用场景：相关系数（Spearman: -1 到 1）
    - 颜色：#313695（深蓝）→ #ffffff（白）→ #d73027（深红）
    - 0 值显示为白色，负值蓝色，正值红色

  - **单极渐变**（min >= 0）：白-黄-红
    - 适用场景：关联强度（Cramér's V, Correlation Ratio: 0 到 1）
    - 颜色：#ffffff（白）→ #fee090（浅黄）→ #d73027（深红）
    - 0 值显示为白色，值越大颜色越深

  【关键约束】
  1. series[0].data 中的 x 索引必须在 [0, len(xAxis)-1] 范围内
  2. series[0].data 中的 y 索引必须在 [0, len(yAxis)-1] 范围内
  3. visualMap.min 和 visualMap.max 必须覆盖数据的实际范围

example: |
  【示例1：双极发散（Spearman 相关系数）】
  {
    "type": "heatmap",
    "data": {
      "title": "数值特征相关性矩阵 (Spearman)",
      "xAxis": ["销售额", "利润", "成本"],
      "yAxis": ["销售额", "利润", "成本"],
      "series": [
        {
          "data": [
            [0, 0, 1.0],    // 销售额 vs 销售额
            [1, 0, 0.85],   // 利润 vs 销售额
            [2, 0, -0.3],   // 成本 vs 销售额
            [0, 1, 0.85],   // 销售额 vs 利润
            [1, 1, 1.0],    // 利润 vs 利润
            [2, 1, -0.5],   // 成本 vs 利润
            [0, 2, -0.3],   // 销售额 vs 成本
            [1, 2, -0.5],   // 利润 vs 成本
            [2, 2, 1.0]     // 成本 vs 成本
          ]
        }
      ],
      "visualMap": {
        "min": -1,
        "max": 1
      }
    }
  }

  【示例2：单极渐变（Cramér's V）】
  {
    "type": "heatmap",
    "data": {
      "title": "类别特征关联强度 (Cramér's V)",
      "xAxis": ["城市", "品牌", "渠道"],
      "yAxis": ["城市", "品牌", "渠道"],
      "series": [
        {
          "data": [
            [0, 0, 1.0],
            [1, 0, 0.45],
            [2, 0, 0.12],
            [0, 1, 0.45],
            [1, 1, 1.0],
            [2, 1, 0.67],
            [0, 2, 0.12],
            [1, 2, 0.67],
            [2, 2, 1.0]
          ]
        }
      ],
      "visualMap": {
        "min": 0,
        "max": 1
      }
    }
  }

common_errors: |
  【常见错误及解决方案】

  1. 索引越界
     - 错误：data 中的 x 或 y 索引超出轴标签范围
     - 解决：确保 x < len(xAxis) 且 y < len(yAxis)

  2. 数据格式错误
     - 错误：data 不是 [x, y, value] 三元组
     - 解决：严格使用 [int, int, float] 格式

  3. visualMap 范围不当
     - 错误：min/max 未覆盖数据实际范围，导致颜色失真
     - 解决：min 应为数据最小值，max 应为数据最大值

  4. 配色策略错误
     - 错误：相关系数使用了单极渐变（min=0）
     - 解决：Spearman 必须设置 min=-1，Cramér's V 设置 min=0

  5. 矩阵不完整
     - 错误：缺少某些 (x, y) 组合的数据点
     - 解决：确保所有 x*y 组合都有对应数据点

  6. 轴标签过长
     - 错误：标签过长导致重叠
     - 解决：使用缩写或旋转标签（组件会自动处理）

  【最佳实践】
  - 矩阵大小：建议不超过 15x15，过大会导致单元格过小
  - 数值精度：保留 2-3 位小数
  - 对角线：相关性矩阵对角线应为 1.0
  - 对称性：相关性矩阵应对称（data[i][j] == data[j][i]）
  - visualMap 范围：
    - Spearman: min=-1, max=1
    - Cramér's V: min=0, max=1
    - Correlation Ratio: min=0, max=1

  【组件特性】
  - 自动配色：根据 visualMap.min 自动选择双极或单极配色

  - 数据兼容：支持多种数据格式
    - 标准格式：series[0].data
    - 简化格式：data（直接在顶层）
    - 对象格式：{value: [x, y, val]}

  - 自动计算范围：
    - 如果未提供 visualMap，自动计算数据极值
    - calculatedMin = Math.min(...values)
    - calculatedMax = Math.max(...values)

  - 单元格标签：
    - label.show: true（始终显示数值）
    - 自动格式化为 2 位小数

  - tooltip:
    - position: 'top'（悬浮在单元格上方）
    - formatter: "yLabel / xLabel<br/>值: value"

  - visualMap 位置：
    - orient: 'horizontal'（横向）
    - left: 'center'（水平居中）
    - bottom: '0%'（底部）
    - calculable: true（可拖动调整范围）

  - 网格分隔：
    - splitArea.show: true（显示网格背景）
    - 交替显示浅色背景

  - 悬浮效果：
    - emphasis.itemStyle.shadowBlur: 10
    - emphasis.itemStyle.shadowColor: 'rgba(0, 0, 0, 0.5)'

  - 图表高度: 400px

  【配色详细说明】
  - 双极发散（min < 0）：
    - 负值区间：#313695（深蓝）→ #ffffff（白）
    - 正值区间：#ffffff（白）→ #d73027（深红）
    - 0 值：白色（中性）

  - 单极渐变（min >= 0）：
    - 低值区间：#ffffff（白）→ #fee090（浅黄）
    - 高值区间：#fee090（浅黄）→ #d73027（深红）
    - 0 值：白色（无关联）
