chart_type: pie
description: 饼图，用于展示占比分布（支持两种数据格式）

data_protocol: |
  前端 Vue 组件需要的数据格式（支持两种格式）：

  【格式1：标准嵌套格式（推荐）】
  {
    "type": "pie",
    "data": {
      "title": "图表标题",
      "series": [
        {
          "data": [                         // 嵌套在 series[0].data 中
            {"name": "分类1", "value": 数值1},
            {"name": "分类2", "value": 数值2}
          ]
        }
      ]
    }
  }

  【格式2：简化格式（兼容）】
  {
    "type": "pie",
    "data": {
      "title": "图表标题",
      "series": [                           // series 直接是数据数组
        {"name": "分类1", "value": 数值1},
        {"name": "分类2", "value": 数值2}
      ]
    }
  }

  【字段说明】
  - series: 数组，支持两种结构：
    - 格式1：series[0].data 是数据数组（ECharts 标准格式）
    - 格式2：series 本身就是数据数组（简化格式）
  - 每个数据项包含：
    - name: 字符串，分类名称（显示在图例和标签中）
    - value: 数值，该分类的数值（自动计算百分比）

  【组件兼容逻辑】
  组件会自动检测格式：
  - 如果 series[0].data 存在且是数组 → 使用格式1
  - 否则 → 使用格式2

  【推荐使用格式1（标准嵌套格式）】
  - 与 ECharts 官方文档一致
  - 更易扩展（如多系列饼图）
  - 避免格式混淆

example: |
  【示例1：标准嵌套格式（推荐）】
  {
    "type": "pie",
    "data": {
      "title": "用户群组占比分布",
      "series": [
        {
          "data": [
            {"name": "分组 1", "value": 4},
            {"name": "分组 2", "value": 5},
            {"name": "分组 3", "value": 6}
          ]
        }
      ]
    }
  }

  【示例2：简化格式（兼容）】
  {
    "type": "pie",
    "data": {
      "title": "销售渠道占比",
      "series": [
        {"name": "线上", "value": 335},
        {"name": "线下", "value": 310},
        {"name": "代理", "value": 234}
      ]
    }
  }

common_errors: |
  【常见错误及解决方案】

  1. 格式混淆
     - 错误：series 既有 data 属性又直接包含 name/value
     - 解决：明确使用格式1或格式2，不要混用

  2. value 为负数或零
     - 错误：value 包含负数或全为 0
     - 解决：饼图只支持正数，使用 df[df['value'] > 0]

  3. 分类过多
     - 错误：超过 8 个分类，图例和标签重叠
     - 解决：合并小分类为"其他"，或使用柱状图

  4. 数据类型错误
     - 错误：value 是字符串 "123" 而非数值 123
     - 解决：使用 int(value) 或 float(value) 转
  5. name 重复
     - 错误：多个数据项的 name 相同
     - 解决：合并重复项或添加后缀区分

  【最佳实践】
  - 使用格式1（标准嵌套格式）以保持一致性
  - 分类数量：建议 3-6 个，不超过 8 个
  - 数值精度：整数或保留 2 位小数
  - 排序：按 value 降序排列，便于阅读
  - 小分类处理：value < 总和*5% 的合并为"其他"

