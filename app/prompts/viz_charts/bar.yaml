chart_type: bar
description: 柱状图，用于展示分类数据对比（支持渐变色和动画效果）

data_protocol: |
  前端 Vue 组件需要的数据格式：
  {
    "type": "bar",
    "data": {
      "title": "图表标题",
      "categories": [...],           // X 轴分类标签
      "series": [                    // 多个系列（支持分组柱状图）
        {
          "name": "系列名称",
          "data": [...]              // Y 轴数值
        }
      ]
    }
  }

  【字段说明】
  - categories: 数组，X 轴分类标签（如产品名、地区名等）
  - series: 数组，每个元素代表一组柱子
    - name: 字符串，系列名称（用于图例）
    - data: 数组，Y 轴数值（与 categories 长度一致）

  【关键约束】
  1. categories 与 series[i].data 长度必须完全一致
  2. 所有 series 的 data 长度必须相同
  3. data 中的值必须是数值类型

example: |
  {
    "type": "bar",
    "data": {
      "title": "各地区销售额对比",
      "categories": ["北京", "上海", "广州", "深圳"],
      "series": [
        {
          "name": "2023年",
          "data": [120, 200, 150, 80]
        },
        {
          "name": "2024年",
          "data": [140, 220, 170, 95]
        }
      ]
    }
  }

common_errors: |
  【常见错误及解决方案】

  1. 数据类型错误
     - 错误：data 包含字符串 "123" 而非数值 123
     - 解决：使用 df['value'].astype(float).tolist()

  2. 长度不匹配
     - 错误：series[i].data 长度与 categories 不一致
     - 解决：确保所有 series 的 data 长度与 categories 相同

  3. 负数值显示
     - 错误：负数柱子显示异常（圆角在底部）
     - 解决：组件支持负数，但圆角固定在顶部，建议负数场景使用其他图表

  4. 分类过多
     - 错误：超过 20 个分类，X 轴标签重叠
     - 解决：旋转标签、采样或使用横向柱状图

  5. 系列过多
     - 错误：超过 3 个系列，颜色重复且柱子过窄
     - 解决：**组件仅支持 2 种渐变色组合**，建议最多 2 个系列

  【最佳实践】
  - 分类数量：建议 3-15 个，不超过 20 个
  - 系列数量：**建议 1-2 个**（组件颜色限制）
  - 数值精度：整数或保留 2 位小数
  - 排序：按数值降序排列，便于对比
  - 标签处理：过长标签使用缩写或换行
