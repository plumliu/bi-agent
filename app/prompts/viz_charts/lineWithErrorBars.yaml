chart_type: lineWithErrorBars
description: 带误差棒的折线图，用于展示测量不确定性和异常检测（支持混合系列和自动标红）

data_protocol: |
  前端 Vue 组件需要的数据格式：
  {
    "type": "lineWithErrorBars",
    "data": {
      "title": "图表标题",
      "categories": [...],           // X 轴数据
      "series": [                    // 多条折线（可混合有/无误差棒）
        {
          "name": "系列名称",
          "data": [...],             // 主数据（必填）
          "errors": [...]            // 误差值（可选）
        }
      ]
    }
  }

  【字段说明】
  - categories: 数组，X 轴标签
  - series: 数组，每个元素代表一条折线
    - name: 字符串，系列名称（用于图例）
    - data: **必填**，数组，主数据（Y 轴数值）
    - errors: **可选**，数组，误差值（与 data 长度一致）

  【误差棒规则】
  - 如果 errors 存在且不全为 0，绘制"工"字形误差棒
  - 误差棒范围：[data[i] - errors[i], data[i] + errors[i]]
  - 如果 errors 全为 0 或不存在，只绘制折线（无误差棒）

  【异常检测规则（自动）】
  组件会自动检测异常点：
  - 前提：存在至少一个有误差棒的系列（基准系列）
  - 对于无误差棒的系列（观测系列）：
    - 如果 data[i] 超出任意基准系列的误差范围
    - 则该点标红（#ee6666）并放大
  - 判定逻辑：data[i] > 任意一个 upper[i] 或 data[i] < 任意一个 lower[i]

  【关键约束】
  1. categories、data、errors 长度必须完全一致
  2. errors[i] >= 0（误差值不能为负）
  3. data 中的值不能为 null

example: |
  【示例1：单系列（仅误差棒）】
  {
    "type": "lineWithErrorBars",
    "data": {
      "title": "实验测量结果",
      "categories": ["实验1", "实验2", "实验3", "实验4"],
      "series": [
        {
          "name": "测量值",
          "data": [10.5, 12.3, 11.8, 13.2],
          "errors": [0.5, 0.8, 0.6, 0.7]
        }
      ]
    }
  }

  【示例2：混合系列（基准 + 观测，自动标红）】
  {
    "type": "lineWithErrorBars",
    "data": {
      "title": "质量控制监测",
      "categories": ["周一", "周二", "周三", "周四", "周五"],
      "series": [
        {
          "name": "标准范围 (±2σ)",
          "data": [100, 102, 101, 103, 102],
          "errors": [2, 2, 2, 2, 2]
        },
        {
          "name": "实际测量值",
          "data": [99, 105, 101, 108, 102],
          "errors": [0, 0, 0, 0, 0]
        }
      ]
    }
  }
  // 在此示例中，"周二"的 105 和"周四"的 108 会自动标红（超出 100±2 和 103±2 范围）

  【示例3：多基准系列】
  {
    "type": "lineWithErrorBars",
    "data": {
      "title": "多模型预测对比",
      "categories": ["1月", "2月", "3月"],
      "series": [
        {
          "name": "模型A预测",
          "data": [100, 110, 105],
          "errors": [5, 6, 5]
        },
        {
          "name": "模型B预测",
          "data": [98, 108, 107],
          "errors": [4, 5, 4]
        },
        {
          "name": "实际值",
          "data": [102, 115, 106],
          "errors": [0, 0, 0]
        }
      ]
    }
  }
  // "2月"的 115 会标红（超出模型A的 110±6 和模型B的 108±5）

common_errors: |
  【常见错误及解决方案】

  1. 长度不匹配
     - 错误：errors 长度与 data 不一致
     - 解决：确保 len(errors) == len(data) == len(categories)

  2. 误差值为负
     - 错误：errors 包含负数
     - 解决：误差值必须 >= 0，使用 abs(error)

  3. errors 全为 0 但期望显示误差棒
     - 错误：errors = [0, 0, 0]，误差棒不显示
     - 解决：检查误差计算逻辑，确保有非零值

  4. Y 轴范围截断
     - 错误：误差棒超出 Y 轴范围
     - 解决：组件会自动计算包含误差棒的 Y 轴范围

  5. 异常检测失效
     - 错误：观测值超出范围但未标红
     - 解决：确保至少有一个系列的 errors 不全为 0

  6. data 包含 null
     - 错误：data 中有 null 导致折线断裂
     - 解决：使用插值或删除 null 点

  【最佳实践】
  - 数据点数量：建议不超过 50 个点
  - 误差值单位：与 data 单位一致（如标准差、标准误）
  - 系列数量：建议不超过 3 个（过多会导致误差棒重叠）
  - 混合使用：
    - 基准系列：errors 为标准差或置信区间
    - 观测系列：errors 全为 0
  - 数值精度：保留 2 位小数

  【异常检测详细逻辑】
  1. 提取所有有误差棒的系列作为"基准系列"
  2. 计算每个基准系列的上下界：
     - upper[i] = data[i] + errors[i]
     - lower[i] = data[i] - errors[i]
  3. 对于无误差棒的系列（观测系列）：
     - 遍历每个数据点 data[i]
     - 如果 data[i] 超出任意基准系列的 [lower[i], upper[i]] 范围
     - 则标记为异常（标红）
  4. 判定条件：data[i] > upper[i] OR data[i] < lower[i]

  【使用场景】
  - 实验测量：显示测量值和测量误差
  - 质量控制：显示标准范围和实际测量值
  - 模型评估：显示预测值、置信区间和实际值
  - A/B 测试：显示对照组、实验组和置信区间
