chart_type: table
description: 表格，用于展示结构化数据明细（支持单元格样式和双向滚动）

data_protocol: |
  前端 Vue 组件需要的数据格式：
  {
    "type": "table",
    "data": {
      "title": "图表标题",
      "categories": [...],           // 表头（列名）
      "series": [                    // 表格数据（行数组）
        [单元格1, 单元格2, ...],      // 第1行
        [单元格1, 单元格2, ...]       // 第2行
      ]
    }
  }

  【字段说明】
  - categories: 数组，表头列名（字符串数组）
  - series: 二维数组，每个元素是一行数据
    - 每行是一个数组，长度必须与 categories 一致
    - 单元格支持两种格式：
      - 格式1：简单值（数值、字符串、null）
      - 格式2：对象 { value, itemStyle }

  【单元格对象格式（可选）】
  {
    "value": 实际值,                 // 必填：显示的内容
    "itemStyle": {                   // 可选：样式配置
      "color": "#ff0000",            // 文字颜色
      "fontWeight": "bold",          // 字体粗细
      "backgroundColor": "#fff3cd"   // 背景色
    }
  }

  【关键约束】
  1. series[i] 的长度必须等于 categories 的长度
  2. 所有行的列数必须相同
  3. 数值会自动保留 2 位小数
  4. null/undefined 会显示为 "-"

example: |
  【示例1：基础表格（简单值）】
  {
    "type": "table",
    "data": {
      "title": "用户预测结果明细",
      "categories": ["用户ID", "预测标签", "置信度", "状态"],
      "series": [
        ["user_001", "高价值", 0.95, "活跃"],
        ["user_002", "潜力", 0.78, "沉睡"],
        ["user_003", "流失", 0.62, "流失"]
      ]
    }
  }

  【示例2：带样式的表格（对象格式）】
  {
    "type": "table",
    "data": {
      "title": "异常检测结果",
      "categories": ["特征", "数值", "异常程度", "状态"],
      "series": [
        [
          "温度",
          {"value": 85.3, "itemStyle": {"fontWeight": "bold"}},
          {"value": 2.5, "itemStyle": {"color": "#ff0000", "fontWeight": "bold"}},
          {"value": "异常", "itemStyle": {"backgroundColor": "#fff3cd", "color": "#856404"}}
        ],
        [
          "湿度",
          45.2,
          0.3,
          "正常"
        ]
      ]
    }
  }

common_errors: |
  【常见错误及解决方案】

  1. 列数不匹配
     - 错误：series[i] 长度与 categories 不一致
     - 解决：确保每行数据列数与表头一致，缺失值用 null 填充

  2. 数据类型混乱
     - 错误：同一列混合数值和字符串
     - 解决：统一列的数据类型，或全部转为字符串

  3. 对象格式错误
     - 错误：itemStyle 拼写错误或缺少 value 字段
     - 解决：严格按照 { value, itemStyle } 格式

  4. 样式属性无效
     - 错误：使用了不支持的 CSS 属性
     - 解决：仅使用 color, fontWeight, backgroundColor 三个属性

  5. 数据量过大
     - 错误：超过 1000 行，渲染卡顿
     - 解决：分页或只显示 top N 条

  6. 表头过长
     - 错误：列名过长导致表格过宽
     - 解决：使用缩写或换行符（组件会自动触发横向滚动）

  【最佳实践】
  - 行数：建议不超过 100 行，过多使用分页
  - 列数：建议不超过 10 列，过多考虑拆分
  - 数值精度：组件自动保留 2 位小数，无需手动处理
  - 空值处理：使用 null 或 undefined，会显示为 "-"
  - 样式使用：仅对关键数据（异常值、重要指标）添加样式
  - 列名：简洁明了，避免过长，优先使用中文
